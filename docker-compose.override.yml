# docker-compose.override.yml — DEVELOPMENT configuration (not versioned)
# This file automatically overrides docker-compose.yml with `docker compose up`.
# For production, use docker-compose.yml only.
services:
  api:
    volumes:
      - ./backend:/app        # Hot reload: code changes are reflected live
      - fastembed_cache:/tmp/fastembed_cache
    command: uvicorn main:app --reload --host 0.0.0.0 --port 8000
    environment:
      - QDRANT_HOST=qdrant

  # The frontend is also built and served with nginx in dev.
  # If you prefer using local Vite (npm run dev), delete this .override.yml file
  # or comment out the frontend block:
  # frontend: {}
